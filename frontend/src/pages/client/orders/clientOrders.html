<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Mis Pedidos</title>
  </head>
  <body class="min-h-screen bg-[#f6f7fb] font-sans text-text-strong">
    <div class="flex min-h-screen flex-col">
      <header class="border-b border-border bg-white px-8 py-4">
        <div
          class="flex items-center justify-end gap-8 text-[14px] text-[#666]"
        >
          <a
            href="../../store/home/home.html"
            class="mr-auto flex items-center gap-2 text-primary"
          >
            <span class="text-[18px]">🍕</span>
            <span class="font-semibold">Food Store</span>
          </a>
          <a href="../../store/home/home.html" class="hover:text-primary"
            >Inicio</a
          >
          <a href="./clientOrders.html" class="hover:text-primary"
            >Mis Pedidos</a
          >
          <a href="#" class="hover:text-primary">Administracion</a>
          <a
            href="../../store/cart/cart.html"
            class="flex items-center gap-1 hover:text-primary"
          >
            <span>🛒</span>
            <span>Carrito</span>
            <span
              class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-primary px-1 text-[11px] font-bold text-white"
              >2</span
            >
          </a>
          <span class="text-text-strong">Juan Perez</span>
          <button
            class="rounded-md border border-border bg-gray-soft px-4 py-2 text-[13px] text-black"
          >
            Cerrar Sesión
          </button>
        </div>
      </header>

      <main class="mx-auto w-full max-w-[1180px] flex-1 px-8 py-6">
        <div
          class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
        >
          <h1 class="text-[28px] font-bold text-text-strong">Mis Pedidos</h1>

          <select
            aria-label="Filtrar pedidos"
            class="h-10 w-full rounded-md border-0 bg-[#dce8ea] px-4 text-[13px] font-semibold text-[#3d4b52] outline-none ring-1 ring-transparent transition focus:ring-primary/25 sm:w-[220px]"
          >
            <option value="all">Todos</option>
            <option value="pending">Pendientes</option>
            <option value="preparing">En preparación</option>
            <option value="delivered">Entregados</option>
            <option value="cancelled">Cancelados</option>
          </select>
        </div>

        <section class="mt-6 space-y-4">
          <article
            class="rounded-lg bg-white px-4 py-3 shadow-[0_4px_14px_rgba(0,0,0,0.08)]"
          >
            <div
              class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between"
            >
              <div>
                <h2 class="text-[13px] font-semibold text-[#2f2f2f]">
                  Pedido #ORD-1760797178248
                </h2>
                <p class="mt-1 text-[10px] text-[#a3a3a3]">
                  📅 13 de octubre de 2025, 11:19 a. m.
                </p>
              </div>

              <span
                class="inline-flex h-7 items-center justify-center rounded-full bg-[#ffe1a3] px-3 text-[10px] font-bold uppercase tracking-wide text-[#f4b23e]"
              >
                Pendiente
              </span>
            </div>

            <div class="my-3 border-t border-[#edf0f4]"></div>

            <div class="space-y-3 text-[13px] text-[#5f6b76]">
              <p class="font-medium text-[#50606b]">
                • Hamburguesa triple (x1)
              </p>

              <div class="border-t border-[#edf0f4]"></div>

              <div
                class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between"
              >
                <p class="text-[13px] text-[#7a8791]">📦 1 producto(s)</p>
                <p class="text-right text-[16px] font-bold text-primary-soft">
                  $25500.00
                </p>
              </div>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
