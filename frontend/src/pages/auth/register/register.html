<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Food-Store</title>
  </head>
  <body class="min-h-screen bg-primary font-sans text-[#1f1f1f]">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
      <section
        class="w-full max-w-85 rounded-xl bg-white px-8 py-10 shadow-[0_10px_28px_rgba(0,0,0,0.12)]"
      >
        <header class="text-center">
          <h1 class="text-[32px] font-extrabold leading-none text-primary-soft">
            SuperFood
          </h1>
          <p class="mt-3 text-[17px] font-bold text-[#2b2b2b]">Registrarse</p>
        </header>

        <form id="register-form" class="mt-8 space-y-5">
          <div
            id="form-message"
            class="hidden rounded-md border px-3 py-2 text-[13px] font-medium"
          ></div>

          <div>
            <label
              for="nombre"
              class="mb-2 block text-[13px] font-semibold text-strong"
              >Nombre</label
            >
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Juan"
              autocomplete="given-name"
              required
              class="h-10 w-full rounded-sm border border-border px-3 text-[13px] outline-none transition focus:border-primary-soft focus:ring-2 focus:ring-primary-soft/20"
            />
          </div>

          <div>
            <label
              for="apellido"
              class="mb-2 block text-[13px] font-semibold text-strong"
              >Apellido</label
            >
            <input
              type="text"
              id="apellido"
              name="apellido"
              placeholder="Perez"
              autocomplete="family-name"
              required
              class="h-10 w-full rounded-sm border border-border px-3 text-[13px] outline-none transition focus:border-primary-soft focus:ring-2 focus:ring-primary-soft/20"
            />
          </div>

          <div>
            <label
              for="email"
              class="mb-2 block text-[13px] font-semibold text-strong"
              >Email</label
            >
            <input
              type="email"
              id="email"
              name="email"
              placeholder="ejemplo@correo.com"
              autocomplete="email"
              required
              class="h-10 w-full rounded-sm border border-border px-3 text-[13px] outline-none transition focus:border-primary-soft focus:ring-2 focus:ring-primary-soft/20"
            />
          </div>

          <div>
            <label
              for="celular"
              class="mb-2 block text-[13px] font-semibold text-strong"
              >Celular</label
            >
            <input
              type="text"
              id="celular"
              name="celular"
              placeholder="+5491122334455"
              autocomplete="tel"
              class="h-10 w-full rounded-sm border border-border px-3 text-[13px] outline-none transition focus:border-primary-soft focus:ring-2 focus:ring-primary-soft/20"
            />
          </div>

          <div>
            <label
              for="password"
              class="mb-2 block text-[13px] font-semibold text-strong"
              >Contraseña</label
            >
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Ingresa tu contraseña"
              autocomplete="new-password"
              minlength="6"
              required
              class="h-10 w-full rounded-sm border border-border px-3 text-[13px] outline-none transition focus:border-primary-soft focus:ring-2 focus:ring-primary-soft/20"
            />
          </div>

          <button
            class="cursor-pointer inline-flex h-10 items-center justify-center rounded-md bg-primary px-5 text-[14px] font-semibold text-white shadow-sm transition hover:bg-primary-hover"
          >
            Registrarse
          </button>
        </form>

        <footer>
          <p class="mt-6 text-center text-[13px] text-[#444]">
            ¿Ya tienes una cuenta?
            <a
              href="../login/login.html"
              class="font-semibold text-[#4f83ff] hover:underline"
              >Iniciar Sesión</a
            >
          </p>
        </footer>
      </section>
    </main>
    <script type="module" src="./register.ts"></script>
  </body>
</html>
