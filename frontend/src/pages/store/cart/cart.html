<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Food Store</title>
  </head>
  <body class="min-h-screen bg-background font-sans text-text-strong">
    <div class="flex min-h-screen flex-col">
      <header class="border-b border-border bg-white px-8 py-4">
        <div
          class="flex items-center justify-end gap-8 text-[14px] text-[#666]"
        >
          <a
            href="../home/home.html"
            class="mr-auto flex items-center gap-2 text-primary"
          >
            <span class="text-[18px]">🍕</span>
            <span class="font-semibold">Food Store</span>
          </a>
          <a href="../home/home.html" class="hover:text-primary">Inicio</a>
          <a
            href="../../client/orders/clientOrders.html"
            class="hover:text-primary"
            >Mis Pedidos</a
          >
          <a
            href="./cart.html"
            class="flex items-center gap-1 hover:text-primary"
          >
            <span>🛒</span>
            <span>Carrito</span>
            <span
              id="cart-count"
              class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-primary px-1 text-[11px] font-bold text-white"
              >0</span
            >
          </a>
          <span id="user-name" class="text-text-strong"></span>
          <button
            id="logout-button"
            type="button"
            class="cursor-pointer rounded-md border border-border bg-gray-soft px-4 py-2 text-[13px] text-black hover:bg-gray-soft-hover"
          >
            Cerrar Sesión
          </button>
        </div>
      </header>

      <main class="flex-1 px-8 py-6">
        <section class="mx-auto max-w-295">
          <h1 class="text-[28px] font-bold text-text-strong">Mi Carrito</h1>

          <div
            class="mt-6 grid gap-6 lg:grid-cols-[minmax(0,1fr)_280px] lg:items-start"
          >
            <section>
              <div id="cart-items" class="space-y-4"></div>
            </section>

            <aside
              class="rounded-lg bg-white p-6 shadow-[0_4px_14px_rgba(0,0,0,0.08)]"
            >
              <h2 class="text-[20px] font-bold text-primary-soft">
                Resumen del Pedido
              </h2>

              <div class="mt-6 space-y-3 text-[13px] text-[#666]">
                <div class="flex items-center justify-between">
                  <span>Subtotal:</span>
                  <span id="cart-subtotal" class="text-text-strong">$0.00</span>
                </div>
              </div>

              <div class="my-5 border-t border-primary-soft/40"></div>

              <div
                class="flex items-center justify-between text-[16px] font-bold text-primary-soft"
              >
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
              </div>

              <div class="mt-6 space-y-3">
                <button
                  type="button"
                  id="open-checkout"
                  class="disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer h-10 w-full rounded-md bg-primary px-4 text-[13px] font-semibold text-white shadow-[0_8px_20px_rgba(255,106,26,0.22)]"
                >
                  Proceder al Pago
                </button>
                <button
                  id="clear-cart-button"
                  class="disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer h-10 w-full rounded-md bg-danger px-4 text-[13px] font-semibold text-white shadow-[0_8px_20px_rgba(239,68,68,0.18)] transition hover:bg-danger-hover"
                >
                  Vaciar Carrito
                </button>
              </div>
            </aside>
          </div>
        </section>
      </main>

      <dialog
        id="checkout-dialog"
        class="checkout-dialog fixed left-1/2 top-1/2 m-0 w-[min(92vw,720px)] -translate-x-1/2 -translate-y-1/2 rounded-[28px] border-0 bg-white p-0 text-text-strong shadow-[0_32px_80px_rgba(0,0,0,0.28)] backdrop:bg-black/55"
      >
        <div class="p-6 sm:p-8">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-[26px] font-bold tracking-tight text-[#333]">
                Completar Pedido
              </h2>
              <p class="mt-1 text-[13px] text-[#8a8a8a]">
                Revisá tus datos antes de confirmar.
              </p>
            </div>

            <button
              type="button"
              id="close-checkout"
              aria-label="Cerrar modal"
              class="inline-flex h-10 w-10 items-center justify-center rounded-full text-[28px] leading-none text-[#7c7c7c] transition hover:bg-[#f4f4f4] hover:text-[#333]"
            >
              ×
            </button>
          </div>

          <form id="checkout-form" class="mt-7 space-y-5">
            <p id="checkout-status" class="text-[13px] text-[#8a8a8a]"></p>

            <div>
              <label
                for="checkout-phone"
                class="text-[15px] font-bold text-[#333]"
              >
                Teléfono
              </label>
              <input
                id="checkout-phone"
                name="phone"
                type="tel"
                required
                pattern="^[0-9+\s()-]{7,}$"
                placeholder="Ej: +54 9 261 123 4567"
                class="mt-3 w-full rounded-[10px] border border-border bg-white px-4 py-3 text-[14px] outline-none transition placeholder:text-[#b4b4b4] focus:border-primary focus:ring-2 focus:ring-primary/20"
              />
            </div>

            <div>
              <label
                for="checkout-address"
                class="text-[15px] font-bold text-[#333]"
              >
                Dirección de Entrega
              </label>
              <textarea
                id="checkout-address"
                name="address"
                required
                rows="3"
                placeholder="Calle, número, piso, depto"
                class="mt-3 w-full rounded-[10px] border border-border bg-white px-4 py-3 text-[14px] outline-none transition placeholder:text-[#b4b4b4] focus:border-primary focus:ring-2 focus:ring-primary/20"
              ></textarea>
            </div>

            <div>
              <label
                for="checkout-payment"
                class="text-[15px] font-bold text-[#333]"
              >
                Método de Pago
              </label>
              <select
                id="checkout-payment"
                name="payment"
                required
                class="mt-3 w-full rounded-[10px] border border-border bg-white px-4 py-3 text-[14px] outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20"
              >
                <option value="" selected disabled>
                  Seleccione una opción
                </option>
              </select>
            </div>

            <div>
              <label
                for="checkout-notes"
                class="text-[15px] font-bold text-[#333]"
              >
                Notas adicionales (opcional)
              </label>
              <textarea
                id="checkout-notes"
                name="notes"
                rows="3"
                placeholder="Instrucciones especiales, timbre, etc."
                class="mt-3 w-full rounded-[10px] border border-border bg-white px-4 py-3 text-[14px] outline-none transition placeholder:text-[#b4b4b4] focus:border-primary focus:ring-2 focus:ring-primary/20"
              ></textarea>
            </div>

            <div class="border-t border-primary-soft/35 pt-5">
              <div
                class="flex items-center justify-between text-[18px] font-bold text-primary-soft"
              >
                <span>Total a pagar:</span>
                <span id="checkout-total">$0.00</span>
              </div>

              <button
                type="submit"
                id="confirm-payment-button"
                disabled
                class="disabled:opacity-50 disabled:cursor-not-allowed mt-5 h-12 w-full rounded-md bg-success px-4 text-[15px] font-semibold text-white shadow-[0_10px_24px_rgba(47,205,176,0.25)] transition hover:brightness-95"
              >
                Confirmar Pago
              </button>
            </div>
          </form>
        </div>
      </dialog>
    </div>

    <script type="module" src="./cart.ts"></script>
  </body>
</html>
