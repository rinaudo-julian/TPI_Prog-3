<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Food Store</title>
  </head>
  <body class="min-h-screen bg-background font-sans text-text-strong">
    <div class="flex min-h-screen flex-col">
      <header class="border-b border-border bg-white px-8 py-4">
        <div
          class="flex items-center justify-end gap-8 text-[14px] text-[#666]"
        >
          <a
            href="../home/home.html"
            class="mr-auto flex items-center gap-2 text-primary"
          >
            <span class="text-[18px]">🍕</span>
            <span class="font-semibold">Food Store</span>
          </a>
          <a href="#" class="hover:text-primary">Inicio</a>
          <a href="#" class="hover:text-primary">Mis Pedidos</a>
          <a href="#" class="hover:text-primary">Administracion</a>
          <a
            href="./cart.html"
            class="flex items-center gap-1 hover:text-primary"
          >
            <span>🛒</span>
            <span>Carrito</span>
            <span
              class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-primary px-1 text-[11px] font-bold text-white"
              >2</span
            >
          </a>
          <span class="text-text-strong">Juan Perez</span>
          <button
            class="cursor-pointer rounded-md border border-border bg-[#eaeaea] px-4 py-2 text-[13px] text-black"
          >
            Cerrar Sesión
          </button>
        </div>
      </header>

      <main class="flex-1 px-8 py-6">
        <section class="mx-auto max-w-[1180px]">
          <h1 class="text-[28px] font-bold text-text-strong">Mi Carrito</h1>

          <div
            class="mt-6 grid gap-6 lg:grid-cols-[minmax(0,1fr)_280px] lg:items-start"
          >
            <section class="space-y-4">
              <article
                class="flex items-center gap-4 rounded-lg bg-white px-4 py-3 shadow-[0_4px_14px_rgba(0,0,0,0.08)]"
              >
                <img
                  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCjUDxXKtszoBJFQbvj8UL2CbVwJVxyM_3iJUHisxHHxpTzGMvolq9XlqSBiI9_SyA38058uL0M-X0ZnRMjjNdUZDXWZ8DnIf0__PTAZc&s=10"
                  alt="Hamburguesa triple"
                  class="h-12 w-12 rounded-md object-cover"
                />

                <div class="min-w-0 flex-1">
                  <p class="text-[13px] font-semibold text-[#2f2f2f]">
                    Hamburguesa triple
                  </p>
                  <p class="mt-0.5 text-[10px] text-[#a3a3a3]">
                    Hamburguesa triple smash
                  </p>
                  <p class="mt-1 text-[14px] font-bold text-primary-soft">
                    $25000.00 c/u
                  </p>
                </div>

                <div
                  class="flex items-center gap-2 text-[14px] font-semibold text-primary-soft"
                >
                  <button
                    class="cursor-pointer flex h-7 w-7 items-center justify-center rounded-sm bg-primary hover:bg-primary-hover text-[16px] text-white"
                  >
                    -
                  </button>
                  <span class="w-6 text-center text-text-strong">1</span>
                  <button
                    class="cursor-pointer flex h-7 w-7 items-center justify-center rounded-sm bg-primary hover:bg-primary-hover text-[16px] text-white"
                  >
                    +
                  </button>
                </div>

                <div
                  class="min-w-23.5 text-right text-[15px] font-bold text-primary-soft"
                >
                  $25000.00
                </div>

                <button
                  class="cursor-pointer flex h-8 p-4 items-center justify-center rounded-md bg-danger text-[14px] text-white transition hover:bg-danger-hover"
                >
                  Eliminar
                </button>
              </article>
            </section>

            <aside
              class="rounded-lg bg-white p-6 shadow-[0_4px_14px_rgba(0,0,0,0.08)]"
            >
              <h2 class="text-[20px] font-bold text-primary-soft">
                Resumen del Pedido
              </h2>

              <div class="mt-6 space-y-3 text-[13px] text-[#666]">
                <div class="flex items-center justify-between">
                  <span>Subtotal:</span>
                  <span class="text-text-strong">$25000.00</span>
                </div>
                <div class="flex items-center justify-between">
                  <span>Envío:</span>
                  <span class="text-text-strong">$500.00</span>
                </div>
              </div>

              <div class="my-5 border-t border-primary-soft/40"></div>

              <div
                class="flex items-center justify-between text-[16px] font-bold text-primary-soft"
              >
                <span>Total:</span>
                <span>$25500.00</span>
              </div>

              <div class="mt-6 space-y-3">
                <button
                  class="cursor-pointer h-10 w-full rounded-md bg-primary px-4 text-[13px] font-semibold text-white shadow-[0_8px_20px_rgba(255,106,26,0.22)]"
                >
                  Proceder al Pago
                </button>
                <button
                  class="cursor-pointer h-10 w-full rounded-md bg-danger px-4 text-[13px] font-semibold text-white shadow-[0_8px_20px_rgba(239,68,68,0.18)] transition hover:bg-danger-hover"
                >
                  Vaciar Carrito
                </button>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
