<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Food Store</title>
  </head>
  <body class="min-h-screen bg-background font-sans text-text-strong">
    <div class="flex min-h-screen flex-col">
      <header class="border-b border-border bg-white px-8 py-4">
        <div
          class="flex items-center justify-end gap-8 text-[14px] text-[#666]"
        >
          <a
            href="./home.html"
            class="mr-auto flex items-center gap-2 text-primary"
          >
            <span class="text-[18px]">🍕</span>
            <span class="font-semibold">Food Store</span>
          </a>
          <a href="./home.html" class="hover:text-primary">Inicio</a>
          <a
            href="../../client/orders/clientOrders.html"
            class="hover:text-primary"
            >Mis Pedidos</a
          >
          <a
            href="../cart/cart.html"
            class="flex items-center gap-1 hover:text-primary"
          >
            <span>🛒</span>
            <span>Carrito</span>
            <span
              class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-primary px-1 text-[11px] font-bold text-white"
              >2</span
            >
          </a>
          <span id="user-name" class="text-text-strong"></span>
          <button
            id="logout-button"
            type="button"
            class="cursor-pointer rounded-md border border-border bg-gray-soft px-4 py-2 text-[13px] text-black hover:bg-gray-soft-hover"
          >
            Cerrar Sesión
          </button>
        </div>
      </header>

      <div class="flex min-h-0 flex-1">
        <aside
          class="flex w-57.5 shrink-0 flex-col border-r border-border bg-white"
        >
          <div class="px-5 py-6">
            <p class="text-[13px] font-semibold text-primary-soft">
              Categorias
            </p>
            <p class="mt-1 text-[11px] text-[#a3a3a3]">Filtra por categoria</p>

            <nav id="categories-nav" class="mt-6 space-y-2 text-[14px]"></nav>
          </div>
        </aside>

        <main class="min-w-0 flex-1 px-8 py-6">
          <section
            class="rounded-lg border border-border bg-white px-6 py-4 shadow-[0_4px_14px_rgba(0,0,0,0.05)]"
          >
            <div class="grid grid-cols-2 gap-3">
              <input
                type="text"
                id="product-search"
                placeholder="Buscar productos..."
                class="h-10 rounded-md border border-border px-4 text-[13px] text-text-strong outline-none placeholder:text-[#9b9b9b]"
              />
              <select
                id="product-sort"
                class="h-10 rounded-md border border-border px-3 text-[13px] text-[#6b6b6b] outline-none"
              >
                <option value="default">Ordenar por</option>
                <option value="price-asc">Precio: menor a mayor</option>
                <option value="price-desc">Precio: mayor a menor</option>
                <option value="name-asc">Nombre: A-Z</option>
                <option value="name-desc">Nombre: Z-A</option>
              </select>
            </div>
          </section>

          <div class="mt-8 flex items-end justify-between">
            <h1 class="text-[26px] font-bold text-text-strong">
              Todos los Productos
            </h1>
            <span id="products-count" class="text-[12px] text-[#8b8b8b]"></span>
          </div>

          <p id="products-status" class="mt-4 text-[13px] text-[#8b8b8b]"></p>

          <section
            id="products-grid"
            class="mt-6 grid gap-7 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4"
          ></section>
        </main>
      </div>
    </div>
    <script type="module" src="./home.ts"></script>
  </body>
</html>
