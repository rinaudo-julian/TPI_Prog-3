<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Food Store</title>
  </head>
  <body class="min-h-screen bg-background font-sans text-text-strong">
    <div class="flex min-h-screen flex-col">
      <header class="border-b border-border bg-white px-8 py-4">
        <div
          class="flex items-center justify-end gap-8 text-[14px] text-[#666]"
        >
          <a
            href="../home/home.html"
            class="mr-auto flex items-center gap-2 text-primary"
          >
            <span class="text-[18px]">🍕</span>
            <span class="font-semibold">Food Store</span>
          </a>
          <a href="#" class="hover:text-primary">Inicio</a>
          <a href="#" class="hover:text-primary">Mis Pedidos</a>
          <a href="#" class="hover:text-primary">Administracion</a>
          <a
            href="../cart/cart.html"
            class="flex items-center gap-1 hover:text-primary"
          >
            <span>🛒</span>
            <span>Carrito</span>
            <span
              class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-primary px-1 text-[11px] font-bold text-white"
              >2</span
            >
          </a>
          <span class="text-text-strong">Juan Perez</span>
          <button
            class="rounded-md border border-border bg-[#f2f4f8] px-4 py-2 text-[13px] text-black"
          >
            Cerrar Sesión
          </button>
        </div>
      </header>

      <main class="flex justify-center items-centerpx-8 py-6">
        <section>
          <div
            class="grid gap-8 lg:grid-cols-[minmax(0,420px)_minmax(0,1fr)] lg:items-start"
          >
            <div
              class="w-full max-w-105 overflow-hidden rounded-xl bg-white shadow-[0_10px_26px_rgba(0,0,0,0.08)]"
            >
              <div class="aspect-4/3">
                <img
                  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCjUDxXKtszoBJFQbvj8UL2CbVwJVxyM_3iJUHisxHHxpTzGMvolq9XlqSBiI9_SyA38058uL0M-X0ZnRMjjNdUZDXWZ8DnIf0__PTAZc&s=10"
                  alt="Hamburguesa triple"
                  class="h-full w-full rounded-lg object-cover"
                />
              </div>
            </div>

            <div class="pt-1">
              <h1 class="text-[30px] font-bold tracking-tight text-[#333]">
                Hamburguesa triple
              </h1>

              <p class="mt-4 text-[22px] font-bold text-primary-soft">
                $25000.00
              </p>

              <span
                class="mt-3 inline-flex rounded-full bg-success px-4 py-1 text-[11px] font-semibold text-white"
              >
                Disponible (stock: 99)
              </span>

              <p class="mt-4 text-[13px] text-[#a0a0a0]">
                Hamburguesa triple smash
              </p>

              <div class="mt-6">
                <p class="text-[13px] font-semibold text-text-strong">
                  Cantidad:
                </p>
                <div class="mt-3 flex items-center gap-3">
                  <button
                    class="cursor-pointer flex h-8 w-8 items-center justify-center rounded-md bg-gray-soft text-[18px] font-bold text-[#7c8b94]"
                  >
                    -
                  </button>
                  <div
                    class="flex h-8 min-w-14 items-center justify-center rounded-md border border-border bg-white text-[14px] font-semibold text-text-strong"
                  >
                    1
                  </div>
                  <button
                    class="cursor-pointer flex h-8 w-8 items-center justify-center rounded-md bg-gray-soft text-[18px] font-bold text-[#7c8b94]"
                  >
                    +
                  </button>
                </div>
              </div>

              <div class="mt-8 flex flex-wrap gap-3">
                <button
                  class="cursor-pointer h-11 min-w-[320px] rounded-md bg-primary px-6 text-[14px] font-semibold text-white shadow-[0_8px_20px_rgba(255,106,26,0.28)] transition hover:bg-primary-hover"
                >
                  Agregar al Carrito
                </button>
                <button
                  class="cursor-pointer h-11 rounded-md bg-gray-soft px-6 text-[14px] font-semibold text-[#6c7780]"
                >
                  ← Volver
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
