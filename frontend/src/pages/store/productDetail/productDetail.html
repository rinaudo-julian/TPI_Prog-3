<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Food Store</title>
  </head>
  <body class="min-h-screen bg-background font-sans text-text-strong">
    <div class="flex min-h-screen flex-col">
      <header class="border-b border-border bg-white px-8 py-4">
        <div
          class="flex items-center justify-end gap-8 text-[14px] text-[#666]"
        >
          <a
            href="../home/home.html"
            class="mr-auto flex items-center gap-2 text-primary"
          >
            <span class="text-[18px]">🍕</span>
            <span class="font-semibold">Food Store</span>
          </a>
          <a href="../home/home.html" class="hover:text-primary">Inicio</a>
          <a href="../../client/orders/clientOrders.html" class="hover:text-primary">Mis Pedidos</a>
          <a
            href="../cart/cart.html"
            class="flex items-center gap-1 hover:text-primary"
          >
            <span>🛒</span>
            <span>Carrito</span>
            <span
              id="cart-count"
              class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-primary px-1 text-[11px] font-bold text-white"
            ></span>
          </a>
          <span id="user-name" class="text-text-strong"></span>
          <button
            id="logout-button"
            type="button"
            class="cursor-pointer rounded-md border border-border bg-[#f2f4f8] px-4 py-2 text-[13px] text-black hover:bg-gray-soft-hover"
          >
            Cerrar Sesión
          </button>
        </div>
      </header>

      <main class="flex justify-center px-8 py-6">
        <section class="w-full max-w-5xl">
          <button
            id="back-button"
            type="button"
            class="mb-4 inline-flex cursor-pointer items-center gap-2 rounded-md border border-border bg-white px-4 py-2 text-[13px] font-medium text-text-strong transition hover:bg-gray-soft"
          >
            <span aria-hidden="true">←</span>
            <span>Volver</span>
          </button>
          <p id="product-status" class="mb-5 text-[13px] text-[#8b8b8b]"></p>
          <div
            id="product-detail"
            class="grid gap-8 lg:grid-cols-[minmax(0,420px)_minmax(0,1fr)] lg:items-start"
          >
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="./productDetail.ts"></script>
  </body>
</html>
