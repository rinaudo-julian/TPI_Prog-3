<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Food Store - Categorías</title>
  </head>
  <body class="min-h-screen bg-background font-sans text-text-strong">
    <div class="flex min-h-screen flex-col">
      <header class="border-b border-border bg-white px-8 py-4">
        <div
          class="flex items-center justify-end gap-8 text-[14px] text-[#666]"
        >
          <a
            href="../../store/home/home.html"
            class="mr-auto flex items-center gap-2 text-primary"
          >
            <span class="text-[18px]">🍕</span>
            <span class="font-semibold">Food Store</span>
          </a>
          <a href="../../store/home/home.html" class="hover:text-primary"
            >Tienda</a
          >
          <a
            href="../adminHome/adminHome.html"
            class="font-medium text-text-strong hover:text-primary"
            >Panel Admin</a
          >
          <span id="user-name" class="text-text-strong"></span>
          <button
            id="logout-button"
            type="button"
            class="cursor-pointer rounded-md border border-border bg-gray-soft px-5 py-2 text-[13px] text-black hover:bg-gray-soft-hover"
          >
            Cerrar Sesión
          </button>
        </div>
      </header>

      <div class="flex min-h-0 flex-1">
        <aside
          class="flex w-57.5 shrink-0 flex-col border-r border-border bg-white"
        >
          <div class="px-5 py-6">
            <p class="text-[16px] font-semibold text-primary-soft">
              Administración
            </p>
            <p class="mt-1 text-[11px] text-[#a3a3a3]">Panel de control</p>

            <nav class="mt-6 space-y-2 text-[14px]">
              <a
                href="../adminHome/adminHome.html"
                class="flex items-center gap-3 px-4 py-4 text-[#555] hover:bg-[#fafafa]"
              >
                <span>📊</span>
                <span class="font-medium">Dashboard</span>
              </a>
              <a
                href="./categorias.html"
                class="flex items-center gap-3 border-l-4 border-primary bg-[#fafafa] px-4 py-4 text-primary-soft"
              >
                <span>🗂️</span>
                <span class="font-medium">Categorías</span>
              </a>
              <a
                href="#"
                class="flex items-center gap-3 px-4 py-4 text-[#555] hover:bg-[#fafafa]"
              >
                <span>🛍️</span>
                <span>Productos</span>
              </a>
              <a
                href="#"
                class="flex items-center gap-3 px-4 py-4 text-[#555] hover:bg-[#fafafa]"
              >
                <span>📦</span>
                <span>Pedidos</span>
              </a>
            </nav>

            <div class="my-6 border-t border-[#efefef]"></div>

            <a
              href="../../store/home/home.html"
              class="flex items-center gap-3 px-4 py-4 text-[#555] hover:bg-[#fafafa]"
            >
              <span>🛒</span>
              <span>Ver Tienda</span>
            </a>
          </div>
        </aside>

        <main class="min-w-0 flex-1 bg-[#f6f7fb] px-8 py-6">
          <div class="max-w-[1380px]">
            <div
              class="flex flex-wrap items-center justify-between gap-4 pl-[110px] pr-2"
            >
              <h1 class="text-[38px] font-bold leading-tight text-text-strong">
                Gestión de Categorías
              </h1>
              <button
                id="open-category-modal"
                type="button"
                class="cursor-pointer rounded-md bg-emerald-400 hover:bg-emerald-300 px-6 py-3 text-[14px] font-semibold text-white shadow-[0_8px_18px_rgba(25,199,184,0.22)]"
              >
                + Nueva Categoría
              </button>
            </div>

            <section
              class="ml-[110px] mt-8 overflow-hidden rounded-xl border border-border bg-white shadow-[0_4px_14px_rgba(0,0,0,0.05)]"
            >
              <div class="overflow-x-auto">
                <table class="min-w-full border-separate border-spacing-0">
                  <thead>
                    <tr
                      class="bg-primary text-left text-[14px] font-semibold text-white"
                    >
                      <th class="px-6 py-4">Nombre</th>
                      <th class="px-6 py-4">Descripción</th>
                      <th class="px-6 py-4">Acciones</th>
                    </tr>
                  </thead>
                  <tbody
                    id="categories-table-body"
                    class="text-[14px] text-text-strong"
                  ></tbody>
                </table>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <dialog
      id="category-dialog"
      class="fixed left-1/2 top-1/2 m-0 w-[min(92vw,520px)] -translate-x-1/2 -translate-y-1/2 rounded-[28px] border-0 bg-white p-0 text-text-strong shadow-[0_32px_80px_rgba(0,0,0,0.28)] backdrop:bg-black/55"
    >
      <div class="p-6 sm:p-8">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h2 class="text-[26px] font-bold tracking-tight text-[#333]">
              Nueva Categoría
            </h2>
          </div>

          <button
            type="button"
            id="close-category-modal"
            aria-label="Cerrar modal"
            class="inline-flex h-10 w-10 items-center justify-center rounded-full text-[28px] leading-none text-[#7c7c7c] transition hover:bg-[#f4f4f4] hover:text-[#333]"
          >
            ×
          </button>
        </div>

        <form id="category-form" class="mt-7 space-y-5">
          <div
            id="category-form-status"
            class="hidden rounded-md px-4 py-3 text-[13px] font-medium"
          ></div>

          <div>
            <label for="category-name" class="text-[15px] font-bold text-[#333]">
              Nombre
            </label>
            <input
              id="category-name"
              name="nombre"
              type="text"
              required
              placeholder="Ej: Electrónica"
              class="mt-3 w-full rounded-[10px] border border-border bg-white px-4 py-3 text-[14px] outline-none transition placeholder:text-[#b4b4b4] focus:border-primary focus:ring-2 focus:ring-primary/20"
            />
          </div>

          <div>
            <label for="category-description" class="text-[15px] font-bold text-[#333]">
              Descripción
            </label>
            <textarea
              id="category-description"
              name="descripcion"
              rows="4"
              placeholder="Descripción opcional"
              class="mt-3 w-full rounded-[10px] border border-border bg-white px-4 py-3 text-[14px] outline-none transition placeholder:text-[#b4b4b4] focus:border-primary focus:ring-2 focus:ring-primary/20"
            ></textarea>
          </div>

          <button
            type="submit"
            class="h-12 w-full rounded-md bg-primary px-4 text-[15px] font-semibold text-white shadow-[0_10px_24px_rgba(255,106,26,0.22)] transition hover:brightness-95"
          >
            Guardar
          </button>
        </form>
      </div>
    </dialog>

    <script type="module" src="./categorias.ts"></script>
  </body>
</html>
