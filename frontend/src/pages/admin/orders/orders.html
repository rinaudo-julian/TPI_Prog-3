<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>Food Store - Pedidos</title>
  </head>
  <body class="min-h-screen bg-background font-sans text-text-strong">
    <div class="flex min-h-screen flex-col">
      <header class="border-b border-border bg-white px-8 py-4">
        <div
          class="flex items-center justify-end gap-8 text-[14px] text-[#666]"
        >
          <a
            href="../adminHome/adminHome.html"
            class="mr-auto flex items-center gap-2 text-primary"
          >
            <span class="text-[18px]">🍕</span>
            <span class="font-semibold">Food Store</span>
          </a>

          <a
            href="../adminHome/adminHome.html"
            class="font-medium text-text-strong hover:text-primary"
            >Panel Admin</a
          >
          <span id="user-name" class="text-text-strong"></span>
          <button
            id="logout-button"
            type="button"
            class="cursor-pointer rounded-md border border-border bg-gray-soft px-5 py-2 text-[13px] text-black hover:bg-gray-soft-hover"
          >
            Cerrar Sesión
          </button>
        </div>
      </header>

      <div class="flex min-h-0 flex-1">
        <aside
          class="flex w-57.5 shrink-0 flex-col border-r border-border bg-white"
        >
          <div class="px-5 py-6">
            <p class="text-[16px] font-semibold text-primary-soft">
              Administración
            </p>
            <p class="mt-1 text-[11px] text-[#a3a3a3]">Panel de control</p>

            <nav class="mt-6 space-y-2 text-[14px]">
              <a
                href="../adminHome/adminHome.html"
                class="flex items-center gap-3 px-4 py-4 text-[#555] hover:bg-[#fafafa]"
              >
                <span>📊</span>
                <span class="font-medium">Dashboard</span>
              </a>
              <a
                href="../categories/categories.html"
                class="flex items-center gap-3 px-4 py-4 text-[#555] hover:bg-[#fafafa]"
              >
                <span>🗂️</span>
                <span>Categorías</span>
              </a>
              <a
                href="../products/products.html"
                class="flex items-center gap-3 px-4 py-4 text-[#555] hover:bg-[#fafafa]"
              >
                <span>🛍️</span>
                <span>Productos</span>
              </a>
              <a
                href="./orders.html"
                class="flex items-center gap-3 border-l-4 border-primary bg-[#fafafa] px-4 py-4 text-primary-soft"
              >
                <span>📦</span>
                <span class="font-medium">Pedidos</span>
              </a>
            </nav>

            <div class="my-6 border-t border-[#efefef]"></div>
          </div>
        </aside>

        <main class="min-w-0 flex-1 bg-[#f6f7fb] px-8 py-6">
          <div class="mx-auto w-full max-w-295 flex-1">
            <div
              class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
            >
              <h1 class="text-[28px] font-bold text-text-strong">
                Gestión de Pedidos
              </h1>

              <div class="flex items-center gap-3">
                <label
                  for="orders-status-filter"
                  class="text-[13px] font-medium text-[#666]"
                >
                  Filtro por estado
                </label>
                <select
                  id="orders-status-filter"
                  class="min-w-[190px] rounded-[10px] border border-border bg-white px-4 py-2 text-[13px] outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20"
                >
                  <option value="ALL">Todos</option>
                  <option value="PENDIENTE">PENDIENTE</option>
                  <option value="CONFIRMADO">CONFIRMADO</option>
                  <option value="TERMINADO">TERMINADO</option>
                  <option value="CANCELADO">CANCELADO</option>
                </select>
              </div>
            </div>

            <p id="orders-count" class="mt-3 text-[13px] text-[#8a8a8a]"></p>

            <p id="orders-status" class="mt-4 text-[13px] text-[#8a8a8a]"></p>

            <section class="mt-6 space-y-4">
              <div id="orders-list" class="space-y-4"></div>
            </section>
          </div>
        </main>
      </div>

      <dialog
        id="order-detail-dialog"
        class="fixed left-1/2 top-1/2 m-0 w-[min(92vw,880px)] -translate-x-1/2 -translate-y-1/2 rounded-[28px] border-0 bg-white p-0 text-text-strong shadow-[0_32px_80px_rgba(0,0,0,0.28)] backdrop:bg-black/55"
      >
        <div class="max-h-[90vh] overflow-y-auto p-6 sm:p-8">
          <div class="flex items-start justify-between gap-4">
            <span
              id="order-detail-status"
              class="mx-auto inline-flex items-center gap-2 rounded-full px-6 py-3 text-[14px] font-bold uppercase tracking-wide"
            >
              <span class="h-2.5 w-2.5 rounded-full bg-current"></span>
              <span>Estado</span>
            </span>

            <button
              id="close-order-detail"
              type="button"
              aria-label="Cerrar modal"
              class="absolute right-6 top-6 inline-flex h-10 w-10 items-center justify-center rounded-full text-[28px] leading-none text-[#7c7c7c] transition hover:bg-[#f4f4f4] hover:text-[#333] sm:right-8 sm:top-8"
            >
              ×
            </button>
          </div>

          <p
            id="order-detail-date"
            class="mt-5 text-center text-[13px] text-[#8a8a8a]"
          ></p>

          <section class="mt-6 rounded-2xl bg-[#f6f8fc] px-5 py-5 sm:px-6">
            <h2 class="text-[22px] font-bold text-[#374151]">
              📍 Información de Entrega
            </h2>

            <div class="mt-5 space-y-3 text-[15px] text-[#4b5563]">
              <p>
                <span class="font-semibold text-text-strong">Dirección:</span>
                <span id="order-detail-address"></span>
              </p>
              <p>
                <span class="font-semibold text-text-strong">Teléfono:</span>
                <span id="order-detail-phone"></span>
              </p>
              <p>
                <span class="font-semibold text-text-strong"
                  >Método de pago:</span
                >
                <span
                  id="order-detail-payment"
                  class="font-semibold text-success"
                ></span>
              </p>
              <p id="order-detail-notes-row" class="hidden">
                <span class="font-semibold text-text-strong">Nota:</span>
                <span id="order-detail-notes"></span>
              </p>
            </div>
          </section>

          <section class="mt-8">
            <h2 class="text-[22px] font-bold text-[#374151]">🧾 Productos</h2>

            <div id="order-detail-products" class="mt-5 space-y-3"></div>
          </section>

          <section class="mt-8 rounded-2xl bg-[#f6f8fc] px-5 py-5 sm:px-6">
            <div class="space-y-4 text-[15px] text-[#666]">
              <div class="flex items-center justify-between">
                <span>Subtotal:</span>
                <span
                  id="order-detail-subtotal"
                  class="text-text-strong"
                ></span>
              </div>
            </div>

            <div class="my-4 border-t border-primary-soft/40"></div>

            <div
              class="flex items-center justify-between text-[18px] font-bold text-primary-soft"
            >
              <span>Total:</span>
              <span id="order-detail-total"></span>
            </div>
          </section>

          <section class="mt-8 rounded-2xl bg-[#f6f8fc] px-5 py-5 sm:px-6">
            <form id="order-status-form" class="space-y-5">
              <div
                id="order-status-form-status"
                class="hidden rounded-md px-4 py-3 text-[13px] font-medium"
              ></div>

              <div>
                <label
                  for="order-status-select"
                  class="text-[15px] font-bold text-[#333]"
                >
                  Estado
                </label>
                <select
                  id="order-status-select"
                  name="estado"
                  class="mt-3 w-full rounded-[10px] border border-border bg-white px-4 py-3 text-[14px] outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20"
                >
                  <option value="PENDIENTE">PENDIENTE</option>
                  <option value="CONFIRMADO">CONFIRMADO</option>
                  <option value="TERMINADO">TERMINADO</option>
                  <option value="CANCELADO">CANCELADO</option>
                </select>
              </div>

              <button
                id="order-status-submit-button"
                type="submit"
                class="cursor-pointer rounded-md bg-primary px-6 py-3 text-[14px] font-semibold text-white hover:bg-primary-soft"
              >
                Actualizar Estado
              </button>
            </form>
          </section>
        </div>
      </dialog>
    </div>

    <script type="module" src="./orders.ts"></script>
  </body>
</html>
